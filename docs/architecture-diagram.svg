<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 750" font-family="Arial, sans-serif">
  <style>
    .title { font-size: 20px; font-weight: 600; fill: #1a1a2e; }
    .layer-title { font-size: 14px; font-weight: 600; fill: #333; }
    .box-title { font-size: 12px; font-weight: 600; fill: #fff; }
    .box-sub { font-size: 10px; fill: #ddd; }
    .label { font-size: 11px; fill: #666; }
    .arrow { stroke: #888; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>
  <rect width="800" height="750" fill="#ffffff"/>
  <text x="400" y="35" text-anchor="middle" class="title">RemesaBlink - Architecture Overview</text>
  <rect x="40" y="55" width="720" height="110" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="400" y="80" text-anchor="middle" class="layer-title">User layer</text>
  <rect x="70" y="95" width="180" height="50" rx="8" fill="#0F6E56"/>
  <text x="160" y="118" text-anchor="middle" class="box-title">WhatsApp user</text>
  <text x="160" y="133" text-anchor="middle" class="box-sub">Migrante en USA</text>
  <rect x="310" y="95" width="180" height="50" rx="8" fill="#0F6E56"/>
  <text x="400" y="118" text-anchor="middle" class="box-title">Landing page</text>
  <text x="400" y="133" text-anchor="middle" class="box-sub">Lovable / React</text>
  <rect x="550" y="95" width="180" height="50" rx="8" fill="#0F6E56"/>
  <text x="640" y="118" text-anchor="middle" class="box-title">Phantom wallet</text>
  <text x="640" y="133" text-anchor="middle" class="box-sub">Firma transacciones</text>
  <line x1="160" y1="145" x2="160" y2="200" class="arrow"/>
  <line x1="400" y1="145" x2="400" y2="200" class="arrow"/>
  <rect x="40" y="205" width="720" height="170" rx="16" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="400" y="230" text-anchor="middle" class="layer-title">Server layer - VPS Hostinger</text>
  <rect x="70" y="250" width="150" height="55" rx="8" fill="#534AB7"/>
  <text x="145" y="273" text-anchor="middle" class="box-title">Baileys bot</text>
  <text x="145" y="290" text-anchor="middle" class="box-sub">WhatsApp connection</text>
  <rect x="240" y="250" width="120" height="55" rx="8" fill="#534AB7"/>
  <text x="300" y="273" text-anchor="middle" class="box-title">AI Agent</text>
  <text x="300" y="290" text-anchor="middle" class="box-sub">Rule-based flow</text>
  <rect x="380" y="250" width="150" height="55" rx="8" fill="#534AB7"/>
  <text x="455" y="273" text-anchor="middle" class="box-title">Express.js</text>
  <text x="455" y="290" text-anchor="middle" class="box-sub">Solana Actions API</text>
  <rect x="550" y="250" width="120" height="55" rx="8" fill="#534AB7"/>
  <text x="610" y="273" text-anchor="middle" class="box-title">Nginx + PM2</text>
  <text x="610" y="290" text-anchor="middle" class="box-sub">24/7 uptime</text>
  <line x1="220" y1="278" x2="238" y2="278" class="arrow"/>
  <line x1="360" y1="278" x2="378" y2="278" class="arrow"/>
  <text x="400" y="348" text-anchor="middle" class="label">Genera Blink URL</text>
  <line x1="400" y1="355" x2="400" y2="410" class="arrow"/>
  <rect x="40" y="415" width="720" height="110" rx="16" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="400" y="440" text-anchor="middle" class="layer-title">Blink layer - Dialect (dial.to)</text>
  <rect x="70" y="455" width="180" height="50" rx="8" fill="#BA7517"/>
  <text x="160" y="478" text-anchor="middle" class="box-title">dial.to renderer</text>
  <text x="160" y="493" text-anchor="middle" class="box-sub">Renderiza el Blink</text>
  <rect x="310" y="455" width="180" height="50" rx="8" fill="#BA7517"/>
  <text x="400" y="478" text-anchor="middle" class="box-title">GET metadata</text>
  <text x="400" y="493" text-anchor="middle" class="box-sub">Icono, titulo, botones</text>
  <rect x="550" y="455" width="180" height="50" rx="8" fill="#BA7517"/>
  <text x="640" y="478" text-anchor="middle" class="box-title">POST sign TX</text>
  <text x="640" y="493" text-anchor="middle" class="box-sub">TX base64 firmable</text>
  <line x1="250" y1="480" x2="308" y2="480" class="arrow"/>
  <line x1="490" y1="480" x2="548" y2="480" class="arrow"/>
  <line x1="400" y1="525" x2="400" y2="580" class="arrow"/>
  <rect x="40" y="585" width="720" height="120" rx="16" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="400" y="610" text-anchor="middle" class="layer-title">Solana blockchain (devnet)</text>
  <rect x="100" y="625" width="160" height="50" rx="8" fill="#3B6D11"/>
  <text x="180" y="648" text-anchor="middle" class="box-title">USDC transfer</text>
  <text x="180" y="663" text-anchor="middle" class="box-sub">SPL Token (6 dec)</text>
  <rect x="320" y="625" width="160" height="50" rx="8" fill="#3B6D11"/>
  <text x="400" y="648" text-anchor="middle" class="box-title">Escrow vault</text>
  <text x="400" y="663" text-anchor="middle" class="box-sub">PDA controlled</text>
  <rect x="540" y="625" width="160" height="50" rx="8" fill="#3B6D11"/>
  <text x="620" y="648" text-anchor="middle" class="box-title">Off-ramp SPEI</text>
  <text x="620" y="663" text-anchor="middle" class="box-sub">MXN al beneficiario</text>
  <line x1="260" y1="650" x2="318" y2="650" class="arrow"/>
  <line x1="480" y1="650" x2="538" y2="650" class="arrow"/>
  <text x="400" y="735" text-anchor="middle" class="label">Node.js + Baileys + Express + @solana/web3.js + SPL Token + dial.to</text>
</svg>